<script>
$(document).on('click', '.btn-view-email-log', function(e) {
    e.preventDefault();
    var msg     = $(this).data('message');
    var to      = $(this).data('to');
    var subject = $(this).data('subject');
    var date    = $(this).data('date');

    $('#emailLogTo').text(to);
    $('#emailLogSubject').text(subject);
    $('#emailLogDate').text(date);

    // Write full HTML into iframe so styles are isolated
    var frame = document.getElementById('emailLogFrame');
    var doc   = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;font-size:14px;padding:12px;color:#212529;}table{border-collapse:collapse;width:100%;}td,th{padding:6px 10px;}a{color:#0d6efd;}</style></head><body>' + msg + '</body></html>');
    doc.close();

    $('#emailLogModal').modal('show');
});
</script>
