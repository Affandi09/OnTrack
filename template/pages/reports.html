		<script>
			$(document).ready(function () {
				$('#ticketsReportForm').on('submit', function (e) {
					var $form = $(this);
					var isIntercepting = $form.data('intercepting');

					// If we have already validated, allow native submission to open the new tab.
					if (isIntercepting === false) {
						return true;
					}

					e.preventDefault();

					// We manually build the payload. Using .serialize() includes the hidden route=reports/view 
					// which overrides ?route=reports/checkEmpty because of PHP's $_GET variable precedence.
					var requestData = {
						clientid: $form.find('[name="clientid"]').val(),
						startDate: $form.find('[name="startDate"]').val(),
						endDate: $form.find('[name="endDate"]').val(),
						report: 'ticketsReport'
					};

					// Check count in background
					$.ajax({
						url: '?route=reports/checkEmpty',
						type: 'GET',
						data: requestData,
						dataType: 'json',
						success: function (response) {
							if (parseInt(response.count) === 0) {
								Swal.fire({
									icon: 'info',
									title: 'Tidak Ada Data',
									text: 'Tidak ada data tiket yang ditemukan pada rentang tanggal, dan/atau client yang Anda pilih.',
									confirmButtonColor: '#3085d6',
									confirmButtonText: 'Tutup'
								});
							} else {
								// Validated. Allow native HTML submission to execute.
								$form.data('intercepting', false);
								$form[0].submit();

								// Reset flag so subsequent clicks check again
								setTimeout(function () {
									$form.data('intercepting', true);
								}, 1000);
							}
						},
						error: function (xhr, status, error) {
							// For debugging: showing what the API returned if JSON parsing fails
							alert("AJAX Error: \nStatus: " + status + "\nError: " + error + "\nResponse: " + xhr.responseText.substring(0, 500));

							// On error, just submit it normally to let PHP throw the original page
							$form.data('intercepting', false);
							$form[0].submit();
						}
					});
				});
			});
		</script>
