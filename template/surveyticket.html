    <script type="text/javascript">
        $(document).ready(function () {
            // Animating question entry
            $('.question-box').each(function (index) {
                $(this).css({
                    'opacity': '0',
                    'transform': 'translateY(20px)'
                });
                setTimeout(() => {
                    $(this).animate({
                        'opacity': '1'
                    }, {
                        step: function (now, fx) {
                            $(this).css('transform', 'translateY(' + (20 * (1 - now)) + 'px)');
                        },
                        duration: 500
                    });
                }, index * 100);
            });
        });

        $('#surveyForm').on('submit', function (e) {
            e.preventDefault();

            Swal.fire({
                title: 'Sedang Mengirim...',
                text: 'Mohon tunggu sebentar',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            // Submit the form via AJAX
            $.post('', $(this).serialize(), function (response) {
                Swal.fire({
                    title: 'Berhasil!',
                    text: 'Terima kasih atas partisipasi Anda dalam survey ini.',
                    icon: 'success',
                    confirmButtonColor: '#3498db'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = '?route=signin';
                    }
                });
            }).fail(function () {
                Swal.fire({
                    title: 'Error!',
                    text: 'Terjadi kesalahan saat mengirim survey. Silakan coba lagi.',
                    icon: 'error',
                    confirmButtonColor: '#e74c3c'
                });
            });
        });
    </script>
