  <script>
    $(document).ready(function () {
      $('#checkTicketForm').submit(function (e) {
        e.preventDefault();
        var ticket = $('#ticketCodeInput').val();
        $('#checkTicketResult').css({ 'background': 'none', 'border': 'none', 'padding': '0', 'display': 'block' });
        $('#checkTicketResult').html('<div class="text-center" style="padding: 40px;"><i class="fa fa-spinner fa-spin fa-3x text-primary" style="opacity: 0.5;"></i></div>');
        $.get('?route=checkticket&view=modal&ticket=' + encodeURIComponent(ticket), function (data) {
          $('#checkTicketResult').html(data);
        }).fail(function () {
          $('#checkTicketResult').html('<div class="alert alert-danger" style="border-radius: 8px;"><i class="fa fa-warning"></i> An error occurred while fetching the ticket.</div>');
        });
      });
      $('#checkTicketModal').on('hidden.bs.modal', function () {
        $('#checkTicketForm')[0].reset();
        $('#checkTicketResult').css({ 'background': '#fafafa', 'border': '1px dashed #ddd', 'padding': '20px', 'display': 'flex' });
        $('#checkTicketResult').html('<p class="help-block text-center" style="margin: 0; color: #888; font-size: 15px;"><i class="fa fa-info-circle text-blue" style="margin-right: 5px;"></i> <?php _e('Enter your ticket code above to view its progress and status.'); ?></p>');
      });
    });
  </script>
