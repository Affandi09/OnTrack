<script type="text/javascript">
    $(document).ready(function () {
        $('.summernote2').summernote({
            height: 250,
            dialogsInBody: true,
            toolbar: [
                ['style', ['style', 'bold', 'italic', 'underline', 'clear']],
                ['font', ['strikethrough']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['insert', ['link', 'table', 'hr']],
                ['view', ['fullscreen', 'codeview', 'help']]
            ]
        });

        $(".select2").select2();
        $(".select2tags").select2({ tags: true });

        // Dynamic add multiple file attachments
        $("#add-file-btn").click(function () {
            var newInput = $('<div class="file-input-group" style="display: flex; margin-bottom: 12px; gap: 10px;">' +
                '<input type="file" name="file[]" class="form-control kb-input file-input" style="flex: 1;">' +
                '<button type="button" class="btn btn-danger remove-file-btn" style="width: 42px; border-radius: 10px;"><i class="fa fa-trash"></i></button>' +
                '</div>');
            $("#file-inputs").append(newInput);
        });

        $(document).on("click", ".remove-file-btn", function () {
            $(this).closest(".file-input-group").remove();
        });

        // File size validation
        $('form').on('submit', function (e) {
            var maxSize = 50 * 1024 * 1024; // 50MB
            var tooLarge = false;

            $('.file-input').each(function () {
                if (this.files && this.files[0]) {
                    if (this.files[0].size > maxSize) {
                        tooLarge = true;
                    }
                }
            });

            if (tooLarge) {
                Swal.fire({
                    title: '<?php _e("Error"); ?>',
                    text: '<?php _e("One or more files are larger than 50MB. Please upload smaller files."); ?>',
                    icon: 'error',
                    confirmButtonColor: '#d33'
                });
                e.preventDefault();
                return false;
            }
        });
    });
</script>
