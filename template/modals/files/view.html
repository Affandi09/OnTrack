<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    <h4 class="modal-title"><?php echo $file['name']; ?></h4>
</div>
<div class="modal-body">
    <link rel="stylesheet" href="template/assets/modern-kb.css">
    
    <div class="preview-container">
        <?php if (strpos($mimetype, 'image/') !== false) { ?>
            <img class="img-responsive center-block" src="?qa=show&id=<?php echo $file['id']; ?>" style="max-height: 80vh;">
        
        <?php } elseif ($mimetype == 'application/pdf') { ?>
            <embed src="?qa=show&id=<?php echo $file['id']; ?>" type="application/pdf" width="100%" height="600px" />
        
        <?php } elseif (strpos($mimetype, 'video/') !== false) { ?>
            <video width="100%" controls style="max-height: 80vh;">
                <source src="?qa=show&id=<?php echo $file['id']; ?>" type="<?php echo $mimetype; ?>">
                Your browser does not support the video tag.
            </video>
        
        <?php } elseif (strpos($mimetype, 'audio/') !== false) { ?>
            <div class="preview-placeholder">
                <i class="fa fa-music"></i>
                <audio controls style="width: 100%;">
                    <source src="?qa=show&id=<?php echo $file['id']; ?>" type="<?php echo $mimetype; ?>">

                </audio>
            </div>

        <?php } else { ?>
            <div class="preview-placeholder">
                <i class="fa fa-<?php echo File::icon($file['file']); ?>"></i>

                <p class="text-muted"><?php _e('This file format cannot be previewed directly. Please download it to view.'); ?></p>
                <div style="margin-top: 20px;">
                    <a href="?qa=download&id=<?php echo $file['id']; ?>" class="btn btn-primary">

                    </a>
                </div>
            </div>
        <?php } ?>

            <i class='fa fa-download'></i> <?php _e('Download'); ?>
        </a>
    <?php } ?>
    <button type="button" class="btn btn-default" data-dismiss="modal">
