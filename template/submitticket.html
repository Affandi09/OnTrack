    <script type="text/javascript">

        $(".select2").select2();
        $('.summernoteTicket').summernote({
            height: 250,
            placeholder: 'Please describe your request in detail...',
            toolbar: [
                ['style', ['style', 'bold', 'italic', 'underline', 'clear']],
                ['font', ['strikethrough']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['insert', ['link', 'table', 'hr']]
                // Notice: image/video buttons removed as attachments are separate
            ]
        });

        // Dynamic add multiple file attachments
        $("#add-file-btn").click(function () {
            var newInput = $('<div class="file-input-group" style="display: flex; margin-bottom: 10px;">' +
                '<input type="file" name="file[]" class="form-control" style="flex: 1; border-radius: 4px;" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.zip">' +
                '<button type="button" class="btn btn-danger remove-file-btn" style="margin-left: 10px; border-radius: 4px;"><i class="fa fa-trash"></i></button>' +
                '</div>');
            $("#file-inputs").append(newInput);
        });

        $(document).on("click", ".remove-file-btn", function () {
            $(this).closest(".file-input-group").remove();
        });

        // Location and Client ID Mapping
        $(document).ready(function () {
            var mappings = <?php echo isset($locations_json) ? $locations_json : '[]'; ?>;
            var clientMappings = <?php echo isset($clients_json) ? $clients_json : '[]'; ?>;

            function updateDataMapping() {
                var branchId = $('#branch_id').val();
                var submitterId = $('#submitter_id').val();

                var mappedLocationId = 0; // Default
                var mappedClientId = 0; // Default

                if (submitterId) {
                    for (var j = 0; j < clientMappings.length; j++) {
                        if (clientMappings[j].submitter_id == submitterId) {
                            mappedClientId = clientMappings[j].client_id;
                            break;
                        }
                    }
                }

                if (branchId && submitterId) {
                    for (var i = 0; i < mappings.length; i++) {
                        if (mappings[i].branch_id == branchId && mappings[i].submitter_id == submitterId) {
                            mappedLocationId = mappings[i].id;
                            break;
                        }
                    }
                }

                $('#mapped_locationid').val(mappedLocationId);
                $('#mapped_clientid').val(mappedClientId);
            }

            $('#branch_id').on('change', updateDataMapping);
            $('#submitter_id').on('change', updateDataMapping);
        });

    </script>
